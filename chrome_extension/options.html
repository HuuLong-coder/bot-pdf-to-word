<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PDF to Word Settings</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f8;
        color: #1f1f1f;
      }
      .card {
        max-width: 720px;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #c7cdd5;
        margin-bottom: 12px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: #0d6efd;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      p {
        margin-bottom: 8px;
      }
      #msg {
        min-height: 22px;
        margin-top: 8px;
        color: #155724;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>PDF to Word Settings</h1>
      <p>Nhap API convert cong khai (duoi dang https).</p>
      <label for="apiUrl">API URL (/convert)</label>
      <input id="apiUrl" type="url" placeholder="https://your-api-domain.com/convert" />
      <button id="saveBtn">Save</button>
      <div id="msg"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
